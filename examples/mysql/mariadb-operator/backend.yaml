apiVersion: v1
kind: Namespace
metadata:
  name: mariadb-demo
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-root
  namespace: mariadb-demo
stringData:
  password: "REPLACE-ME-root-pw"
---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-monitor
  namespace: mariadb-demo
stringData:
  password: "REPLACE-ME-monitor-pw"
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb
  namespace: mariadb-demo
spec:
  rootPasswordSecretKeyRef:
    name: mariadb-root
    key: password

  storage:
    size: 2Gi

  # Replication topology: 1 primary, 2 replicas. The operator manages
  # promotion via `read_only`, which is exactly what
  # `mysqlReplicationHostgroups` in ProxySQL is built to follow.
  replicas: 3
  replication:
    enabled: true
    primary:
      autoFailover: true
    replica:
      gtid: CurrentPos
---
# Pre-create a low-privilege monitor user — ProxySQL uses this to ping
# backends and observe their `read_only` flag.
apiVersion: k8s.mariadb.com/v1alpha1
kind: User
metadata:
  name: monitor
  namespace: mariadb-demo
spec:
  mariaDbRef:
    name: mariadb
  passwordSecretKeyRef:
    name: mariadb-monitor
    key: password
  host: "%"
---
apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: monitor-replication-client
  namespace: mariadb-demo
spec:
  mariaDbRef:
    name: mariadb
  privileges:
    - REPLICATION CLIENT
  database: "*"
  table: "*"
  username: monitor
  host: "%"
