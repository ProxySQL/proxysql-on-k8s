apiVersion: v1
kind: Namespace
metadata:
  name: oracle-mysql-demo
---
# A 3-instance InnoDB Cluster with 1 MySQL Router pod.
#
# Connection points the operator creates for us:
#   mycluster                    R/W traffic via Router on port 6446
#                                R/O traffic via Router on port 6447
#   mycluster-instances          headless; per-instance pod DNS
#
# The rootPassword secret (`mycluster-secret`) is created by the user
# beforehand — see README. ProxySQL reuses that same secret for the
# `root` user wired into the ProxySQLConfig.
apiVersion: mysql.oracle.com/v2
kind: InnoDBCluster
metadata:
  name: mycluster
  namespace: oracle-mysql-demo
spec:
  secretName: mycluster-secret
  tlsUseSelfSigned: true
  instances: 3
  router:
    instances: 1
  datadirVolumeClaimTemplate:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 2Gi
