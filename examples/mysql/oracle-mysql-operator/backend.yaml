apiVersion: v1
kind: Namespace
metadata:
  name: oracle-mysql-demo
---
# Root credentials for the InnoDBCluster. The operator expects exactly these
# keys. ProxySQL reuses this same secret for the `root` user wired into the
# ProxySQLConfig — no copies, no rotation drift.
apiVersion: v1
kind: Secret
metadata:
  name: mycluster-secret
  namespace: oracle-mysql-demo
stringData:
  rootUser: "root"
  rootHost: "%"
  rootPassword: "REPLACE-ME-root-pw"
---
# A single-instance InnoDBCluster with NO MySQL Router pods — ProxySQL
# (managed by the ProxySQL operator) takes Router's place as the access
# layer. The operator still creates:
#   mycluster-instances    headless; per-instance pod DNS (what we use)
#   mycluster              Router service — no endpoints with router.instances=0
#
# One instance keeps the example kind-sized. For real HA bump `instances`
# to 3 and add the secondaries to hostgroup 1 in proxysql.yaml.
apiVersion: mysql.oracle.com/v2
kind: InnoDBCluster
metadata:
  name: mycluster
  namespace: oracle-mysql-demo
spec:
  secretName: mycluster-secret
  tlsUseSelfSigned: true
  instances: 1
  router:
    instances: 0
  datadirVolumeClaimTemplate:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 2Gi
