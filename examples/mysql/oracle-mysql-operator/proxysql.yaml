apiVersion: proxysql.com/v1alpha1
kind: ProxySQLCluster
metadata:
  name: proxysql
  namespace: oracle-mysql-demo
spec:
  replicas: 3
  protocols:
    mysql:
      enabled: true
---
apiVersion: proxysql.com/v1alpha1
kind: ProxySQLConfig
metadata:
  name: pxcfg
  namespace: oracle-mysql-demo
spec:
  clusterRef:
    name: proxysql
  # No Router in this topology (router.instances=0) — ProxySQL talks straight
  # to the instance via its stable per-pod DNS from the `mycluster-instances`
  # headless Service. With a single instance everything lives in hostgroup 0.
  # Scaling out: bump `instances` in backend.yaml and add the new pods
  # (mycluster-1, mycluster-2, ...) to hostgroup 1 as the read pool.
  mysqlServers:
    - hostgroup: 0
      hostname: mycluster-0.mycluster-instances.oracle-mysql-demo.svc.cluster.local
      port: 3306
      # MySQL 8.4/9.x accounts default to caching_sha2_password, which needs
      # a secure channel for full authentication — so connect over TLS
      # (the certs come from tlsUseSelfSigned in backend.yaml).
      useSSL: true
      comment: "InnoDB Cluster instance 0 (primary)"
  mysqlUsers:
    # InnoDBCluster only provisions the `root` account, so that's the user we
    # wire through. For an app-specific account, create it in the backend
    # (e.g. via the operator's user management) with its own Secret and add a
    # mysqlUsers entry referencing that — do NOT reuse root's password.
    - username: root
      defaultHostgroup: 0
      passwordSecretRef:
        name: mycluster-secret
        key: rootPassword
