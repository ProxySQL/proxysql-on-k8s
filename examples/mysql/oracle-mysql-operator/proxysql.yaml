apiVersion: proxysql.com/v1alpha1
kind: ProxySQLCluster
metadata:
  name: proxysql
  namespace: oracle-mysql-demo
spec:
  replicas: 3
  protocols:
    mysql:
      enabled: true
---
apiVersion: proxysql.com/v1alpha1
kind: ProxySQLConfig
metadata:
  name: pxcfg
  namespace: oracle-mysql-demo
spec:
  clusterRef:
    name: proxysql
  # Both rows resolve to the same Router Service — the operator's R/W port
  # (6446) is the primary, the R/O port (6447) is the read-only fan-out.
  # The Router itself does the GR primary selection; ProxySQL adds query
  # rules + connection multiplexing on top.
  mysqlServers:
    - hostgroup: 0
      hostname: mycluster.oracle-mysql-demo.svc.cluster.local
      port: 6446
      comment: "writer via Router R/W port"
    - hostgroup: 1
      hostname: mycluster.oracle-mysql-demo.svc.cluster.local
      port: 6447
      comment: "reader via Router R/O port"
  mysqlUsers:
    # InnoDBCluster only provisions the `root` account, so that's the user we
    # wire through. For an app-specific account, create it in the backend
    # (e.g. via the operator's user management) with its own Secret and add a
    # mysqlUsers entry referencing that — do NOT reuse root's password.
    - username: root
      defaultHostgroup: 0
      passwordSecretRef:
        name: mycluster-secret
        key: rootPassword
  mysqlQueryRules:
    # SELECT ... FOR UPDATE / SELECT ... LOCK IN SHARE MODE must hit the writer.
    - ruleId: 100
      active: true
      matchDigest: "^SELECT.*FOR UPDATE$"
      destinationHostgroup: 0
      apply: true
      comment: "locked reads → writer"
    # Plain SELECTs → readers (Router R/O port).
    - ruleId: 200
      active: true
      matchDigest: "^SELECT"
      destinationHostgroup: 1
      apply: true
      comment: "SELECTs → readers"
