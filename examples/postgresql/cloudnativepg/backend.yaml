apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-demo
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg
  namespace: cnpg-demo
spec:
  instances: 3
  storage:
    size: 2Gi

  # CNPG 1.21+ disables superuser access by default and does NOT create the
  # pg-superuser secret unless this is set. The ProxySQLConfig references the
  # `postgres` user via that secret, so enable it explicitly. (Drop this and
  # the postgres user from proxysql.yaml if you only need the app user.)
  enableSuperuserAccess: true

  # With the above, CNPG creates and rotates these secrets automatically:
  #   pg-superuser  → superuser (postgres)
  #   pg-app        → application user (default name "app", db "app")
  # Both are referenced by ProxySQLConfig — no copies, no rotation drift.
  bootstrap:
    initdb:
      database: app
      owner: app
