apiVersion: proxysql.com/v1alpha1
kind: ProxySQLCluster
metadata:
  name: proxysql
  namespace: crunchy-demo
spec:
  replicas: 3
  protocols:
    pgsql:
      enabled: true
---
apiVersion: proxysql.com/v1alpha1
kind: ProxySQLConfig
metadata:
  name: pxcfg
  namespace: crunchy-demo
spec:
  clusterRef:
    name: proxysql
  pgsqlServers:
    # PGO's `<cluster>-primary` Service tracks the current Patroni leader —
    # Patroni re-points it on failover, so this row always reaches the writer.
    # With a single instance (backend.yaml) there are no standbys; if you
    # scale `replicas` up, add `hippo-replicas.crunchy-demo.svc.cluster.local`
    # here as hostgroup 1 and split reads like the cloudnativepg example.
    - hostgroup: 0
      hostname: hippo-primary.crunchy-demo.svc.cluster.local
      port: 5432
      comment: "Patroni leader"
  pgsqlUsers:
    - username: app
      defaultHostgroup: 0
      passwordSecretRef:
        name: hippo-pguser-app # PGO-managed
        key: password
    - username: postgres
      defaultHostgroup: 0
      passwordSecretRef:
        name: hippo-pguser-postgres # PGO-managed (requires `postgres` in spec.users)
        key: password
