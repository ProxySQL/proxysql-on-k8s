apiVersion: v1
kind: Namespace
metadata:
  name: crunchy-demo
---
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: hippo
  namespace: crunchy-demo
spec:
  postgresVersion: 16

  # One Postgres instance keeps the example kind-sized. For real HA set
  # replicas: 3 and add `hippo-replicas` to hostgroup 1 in proxysql.yaml.
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi

  # Backups are required by PGO; use a single PVC repo to keep the example tight.
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 2Gi

  # PGO's generated pg_hba only contains `hostssl` rules, i.e. it REQUIRES
  # TLS from every client. The ProxySQL operator's `pgsqlServers` entries
  # can't enable backend TLS yet (no useSSL field on the pgsql side), so we
  # append a rule that also accepts non-TLS connections, password-checked
  # with SCRAM. PGO still prepends its own mandatory entries (certificate
  # auth for replication), so only ordinary client traffic is affected.
  # Drop this once ProxySQL→Postgres TLS is wired through the CRD.
  patroni:
    dynamicConfiguration:
      postgresql:
        pg_hba:
          - "host all all all scram-sha-256"

  # Declare the users PGO should manage. Each gets a Secret named
  # `hippo-pguser-<user>` holding its password — ProxySQL references those
  # secrets directly. Declaring `postgres` makes PGO manage (and expose) the
  # superuser's password too; without it no hippo-pguser-postgres exists.
  users:
    - name: app
      databases:
        - app
    - name: postgres
