apiVersion: v1
kind: Namespace
metadata:
  name: crunchy-demo
---
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: hippo
  namespace: crunchy-demo
spec:
  postgresVersion: 16

  # Three Postgres instances under Patroni control.
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi

  # Backups are required by PGO; use a single PVC repo to keep the example tight.
  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes: [ReadWriteOnce]
              resources:
                requests:
                  storage: 2Gi

  # Declare an application user. PGO creates a Secret named
  # `hippo-pguser-app` holding its password — ProxySQL references that
  # secret directly.
  users:
    - name: app
      databases:
        - app
      options: "LOGIN"
