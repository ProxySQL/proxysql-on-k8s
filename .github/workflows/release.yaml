name: release

# Trigger:
#   - `v*` tags publish a chart bundle + multi-arch operator image
#   - manual workflow_dispatch lets us re-run an image push without retagging
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)publish, e.g. v0.1.0"
        required: true

permissions:
  contents: write # chart-releaser writes a Release + commits to gh-pages
  packages: write # ghcr.io image push
  id-token: write # cosign keyless OIDC (future)

env:
  IMG_REPO: ghcr.io/${{ github.repository_owner }}/proxysql-operator
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # --------------------------------------------------------------------------
  # Helm charts → chart-releaser-action → gh-pages branch.
  # Users `helm repo add proxysql https://<owner>.github.io/<repo>`.
  # --------------------------------------------------------------------------
  charts:
    name: release / charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # chart-releaser needs full history

      - name: configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------------------------
  # Operator image: buildx build multi-arch → push to ghcr.io with both the
  # version tag and `latest`.
  # --------------------------------------------------------------------------
  image:
    name: release / operator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: resolve tag
        id: tag
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          # github.ref_name on a tag push is the tag itself (eg v0.1.0); on dispatch it's the input.
          echo "tag=${ref}" >> "$GITHUB_OUTPUT"
          # Image tags drop the leading `v` to match Docker convention.
          echo "image=${ref#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMG_REPO }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.image }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: operator
          file: operator/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.tag.outputs.tag }}
            COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
