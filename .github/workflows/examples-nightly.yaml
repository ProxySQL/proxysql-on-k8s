name: examples-nightly

# End-to-end smoke of the backend-operator cookbooks under examples/, against
# the REAL backend operators (CloudNativePG, mariadb-operator, ...). These are
# heavy and network-dependent (they pull whole operators), so they run nightly
# and on demand — never on PRs. Each example is an independent matrix leg
# (fail-fast: false) so one flaky backend doesn't mask the others.
#
# See test/examples/smoke.sh for the per-example logic.

on:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC nightly
  workflow_dispatch:
    inputs:
      example:
        description: "Single example to run (blank = all)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: examples-nightly
  cancel-in-progress: true

env:
  KIND_NODE_IMAGE: kindest/node:v1.34.8

jobs:
  smoke:
    name: examples / ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One leg per backend-operator cookbook under examples/ — all six
        # validated end-to-end.
        example:
          [
            cloudnativepg,
            mariadb-operator,
            percona-ps,
            percona-pxc,
            oracle-mysql-operator,
            crunchy-pgo,
          ]
    steps:
      - uses: actions/checkout@v4

      # Only run the dispatch-selected example, if one was given.
      - name: skip non-selected example
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.example != '' && github.event.inputs.example != matrix.example }}
        run: echo "skip=true" >> "$GITHUB_ENV"

      # MySQL 8.x aborts at InnoDB init ("io_setup() failed with EAGAIN",
      # "Cannot initialize AIO sub-system") when the kernel's AIO context
      # limit is exhausted — the runner default (fs.aio-max-nr=65536) is too
      # low. fs.aio-max-nr is not namespaced, so raising it on the runner
      # host also applies inside the kind node. MariaDB/PostgreSQL don't
      # need this (they fall back / don't use Linux native AIO), but it's
      # harmless for those legs.
      - name: raise fs.aio-max-nr for MySQL-family backends
        if: ${{ env.skip != 'true' }}
        run: sudo sysctl -w fs.aio-max-nr=1048576

      # The runner image preinstalls MySQL, and its AppArmor profile for
      # /usr/sbin/mysqld is loaded on the HOST kernel. AppArmor attaches
      # profiles by executable path kernel-wide, and kind containers get no
      # AppArmor policy namespace — so mysqld inside ANY pod (Percona/PXC/
      # Oracle images all ship /usr/sbin/mysqld) is confined by the host's
      # Ubuntu-MySQL profile and gets EACCES opening its own /etc/my.cnf,
      # /usr/share/*/errmsg.sys, etc. Unload the profile.
      - name: unload host mysqld AppArmor profile
        if: ${{ env.skip != 'true' }}
        run: |
          sudo aa-status 2>/dev/null | grep -i mysql || echo "(no mysql profiles listed)"
          found=0
          for p in /etc/apparmor.d/usr.sbin.mysqld /etc/apparmor.d/*mysql*; do
            [ -f "$p" ] || continue
            sudo apparmor_parser -R "$p" 2>/dev/null && { echo "unloaded $p"; found=1; } || true
          done
          [ "$found" = 1 ] || echo "no profile file found/unloaded"

      - uses: azure/setup-helm@v4
        if: ${{ env.skip != 'true' }}
        with:
          version: v3.16.4

      - uses: docker/setup-buildx-action@v3
        if: ${{ env.skip != 'true' }}

      - name: build + kind-load operator image
        if: ${{ env.skip != 'true' }}
        run: |
          docker buildx build --load -t proxysql-operator:ci ./operator
          docker pull proxysql/proxysql:3.0

      - uses: helm/kind-action@v1
        if: ${{ env.skip != 'true' }}
        with:
          # kind >= v0.32.0 is required for the June-2026 node images
          # (containerd 2.x with config version 4).
          version: v0.32.0
          node_image: ${{ env.KIND_NODE_IMAGE }}
          cluster_name: examples

      - name: load images into kind
        if: ${{ env.skip != 'true' }}
        run: |
          kind load docker-image proxysql-operator:ci --name examples
          kind load docker-image proxysql/proxysql:3.0 --name examples

      # Debug probe for the MySQL image-permission failures: run the same
      # image as a plain sleep pod (no probes, stays up) and inspect what
      # mysqld actually sees at runtime.
      - name: probe mysql image runtime behavior
        if: ${{ env.skip != 'true' && matrix.example == 'percona-ps' }}
        run: |
          kubectl create ns probe || true
          kubectl -n probe run psdbg --image=percona/percona-server:8.4.8-8.1 --restart=Never \
            --overrides='{"spec":{"securityContext":{"runAsUser":0},"containers":[{"name":"psdbg","image":"percona/percona-server:8.4.8-8.1","command":["sleep","900"]}]}}'
          kubectl -n probe wait --for=condition=Ready pod/psdbg --timeout=180s
          kubectl -n probe exec psdbg -- bash -c '
            id
            echo "--- print-defaults (as root):"
            mysqld --print-defaults 2>&1 | tail -2 | cut -c1-500
            microdnf install -y strace >/dev/null 2>&1 || echo "strace install failed"
            echo "--- strace print-defaults:"
            strace -qq -f -o /tmp/t1 mysqld --print-defaults >/dev/null 2>&1 || true
            grep -E "my.cnf|\.cnf" /tmp/t1 | head -20
            echo "--- strace validate-config (errmsg):"
            strace -qq -f -o /tmp/t2 mysqld --validate-config --datadir=/tmp/dd >/dev/null 2>&1 || true
            grep -E "errmsg|english" /tmp/t2 | head -10
            echo "--- failed syscalls:"
            grep -E "= -1 " /tmp/t1 | grep -vE "ENOENT.*(ld\.so|locale|gconv|tls|haswell|x86_64|glibc)" | head -20
          ' || true
          kubectl -n probe delete pod psdbg --wait=false || true

      - name: smoke ${{ matrix.example }}
        if: ${{ env.skip != 'true' }}
        env:
          IMG: proxysql-operator:ci
        run: ./test/examples/smoke.sh ${{ matrix.example }}

      - name: diagnostics on failure
        if: ${{ failure() && env.skip != 'true' }}
        run: |
          kubectl get pods -A 2>&1 | grep -vE "kube-system|local-path" || true
          kubectl -n proxysql-system logs deploy/proxysql-operator --tail=150 || true
          # Backend-namespace diagnostics: every example uses a *-demo ns.
          for ns in $(kubectl get ns -o name | grep -- '-demo' | cut -d/ -f2); do
            echo "==== $ns pods ===="; kubectl -n "$ns" get pods -o wide || true
            kubectl -n "$ns" get events --sort-by=.lastTimestamp 2>/dev/null | tail -40 || true
            # Dump logs + describe for every not-Ready pod. NOTE: a pod in
            # CrashLoopBackOff still has status.phase=Running, so filter on the
            # Ready condition instead of the phase.
            for pod in $(kubectl -n "$ns" get pods -o name 2>/dev/null | cut -d/ -f2); do
              ready="$(kubectl -n "$ns" get pod "$pod" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null)"
              [[ "$ready" == "True" ]] && continue
              echo "--- describe $pod ---"
              kubectl -n "$ns" describe pod "$pod" 2>/dev/null | head -80 || true
              for container in $(kubectl -n "$ns" get pod "$pod" -o jsonpath='{range .spec.containers[*]}{.name}{"\n"}{end}' 2>/dev/null); do
                echo "--- logs $pod/$container ---"
                kubectl -n "$ns" logs "$pod" -c "$container" --tail=80 2>/dev/null || echo "(no logs)"
                echo "--- previous logs $pod/$container ---"
                kubectl -n "$ns" logs "$pod" -c "$container" --previous --tail=80 2>/dev/null || echo "(no previous logs)"
              done
            done
            # MySQL-family backends write state/bootstrap logs into the datadir.
            # The datadir is a local-path PV inside the kind node container, so
            # read it via docker exec — works even while the pod is crash-looping.
            docker exec examples-control-plane sh -c '
              for f in /var/local-path-provisioner/*/mysql.state \
                       /var/local-path-provisioner/*/mysql-state-monitor.log \
                       /var/local-path-provisioner/*/bootstrap.log; do
                [ -f "$f" ] && { echo "=== $f ==="; tail -40 "$f"; }
              done' 2>/dev/null || true
            # Deep filesystem diagnostics for the MySQL image-permission failures:
            # how did containerd unpack the image layers on the kind node?
            docker exec examples-control-plane sh -c '
              for d in /var/lib/containerd/io.containerd.snapshotter.v1.overlayfs/snapshots/*/fs; do
                [ -e "$d/usr/share/percona-server" ] && { echo "== $d"; ls -la "$d/usr/share/percona-server/" | head -8; ls -la "$d/usr/share/percona-server/english/errmsg.sys" 2>/dev/null; }
                [ -e "$d/etc/my.cnf" ] && { echo "== $d/etc"; ls -la "$d/etc/my.cnf" "$d/etc/my.cnf.d" 2>/dev/null; }
              done' 2>/dev/null | head -60 || true
            # And from inside the running container (crash-loop window ~20s per
            # cycle, so retry): what does mysqld actually see?
            if kubectl -n "$ns" get pod cluster1-mysql-0 >/dev/null 2>&1; then
              for i in $(seq 1 30); do
                if kubectl -n "$ns" exec cluster1-mysql-0 -c mysql -- sh -c '
                    id
                    echo "--- /etc/my.cnf:"; ls -la /etc/my.cnf /etc/my.cnf.d/ 2>&1; head -30 /etc/my.cnf 2>&1
                    echo "--- node.cnf:"; cat /etc/my.cnf.d/node.cnf 2>&1 | head -30
                    echo "--- errmsg.sys:"; ls -la /usr/share/percona-server/english/errmsg.sys 2>&1; head -c 16 /usr/share/percona-server/english/errmsg.sys >/dev/null 2>&1 && echo readable || echo NOT-readable
                    echo "--- print-defaults:"; mysqld --print-defaults 2>&1 | head -5
                  ' 2>/dev/null; then
                  break
                fi
                sleep 3
              done
            fi
            # Also dump the backend CR status for debugging
            kubectl -n "$ns" get perconaservermysqls.ps.percona.com -o yaml 2>/dev/null | grep -A 30 'status:' | head -40 || true
            kubectl -n "$ns" get perconaxtradbclusters.pxc.percona.com -o yaml 2>/dev/null | grep -A 30 'status:' | head -40 || true
            kubectl -n "$ns" get innodbclusters.mysql.oracle.com -o yaml 2>/dev/null | grep -A 30 'status:' | head -40 || true
            kubectl -n "$ns" get cluster.postgresql.cnpg.io -o yaml 2>/dev/null | grep -A 30 'status:' | head -40 || true
          done
