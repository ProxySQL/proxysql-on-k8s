{{- /*
The rendered proxysql.cnf embeds the admin/radmin/monitor passwords, so it
ships as a Secret (named "<fullname>-cnf" to avoid colliding with the auth
Secret named "<fullname>").
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxysql-cluster.fullname" . }}-cnf
  labels:
    {{- include "proxysql-cluster.labels" . | nindent 4 }}
type: Opaque
stringData:
  proxysql.cnf: |
{{ tpl (.Files.Get "files/proxysql.cnf") . | indent 4 }}
