{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "proxysql-cluster.fullname" . }}-test-connection
  labels:
    {{- include "proxysql-cluster.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: tcp-probe
      image: {{ .Values.tests.image }}
      command:
        - sh
        - -c
        - |
          set -eu
          host={{ include "proxysql-cluster.fullname" . }}
          fail=0
          {{- if .Values.protocols.mysql.enabled }}
          echo "Checking MySQL port {{ .Values.protocols.mysql.port }} on $host"
          nc -z -w 5 "$host" {{ .Values.protocols.mysql.port }} || fail=1
          {{- end }}
          {{- if .Values.protocols.pgsql.enabled }}
          echo "Checking PostgreSQL port {{ .Values.protocols.pgsql.port }} on $host"
          nc -z -w 5 "$host" {{ .Values.protocols.pgsql.port }} || fail=1
          {{- end }}
          {{- if .Values.service.exposeAdmin }}
          echo "Checking admin port {{ .Values.admin.port }} on $host"
          nc -z -w 5 "$host" {{ .Values.admin.port }} || fail=1
          {{- end }}
          exit "$fail"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        capabilities:
          drop: [ALL]
        seccompProfile:
          type: RuntimeDefault
{{- end }}
