apiVersion: v1
kind: Service
metadata:
  name: {{ include "proxysql-cluster.headlessName" . }}
  labels:
    {{- include "proxysql-cluster.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "proxysql-cluster.selectorLabels" . | nindent 4 }}
  ports:
    - name: admin
      port: {{ .Values.admin.port }}
      targetPort: admin
      protocol: TCP
    {{- if .Values.protocols.mysql.enabled }}
    - name: mysql
      port: {{ .Values.protocols.mysql.port }}
      targetPort: mysql
      protocol: TCP
    {{- end }}
    {{- if .Values.protocols.pgsql.enabled }}
    - name: pgsql
      port: {{ .Values.protocols.pgsql.port }}
      targetPort: pgsql
      protocol: TCP
    {{- end }}
