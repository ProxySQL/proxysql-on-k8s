{{- $pw := fromYaml (include "proxysql.passwords" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxysql.fullname" . }}
  labels:
    {{- include "proxysql.labels" . | nindent 4 }}
type: Opaque
data:
  admin-password:   {{ $pw.admin   | b64enc | quote }}
  radmin-password:  {{ $pw.radmin  | b64enc | quote }}
  monitor-password: {{ $pw.monitor | b64enc | quote }}
