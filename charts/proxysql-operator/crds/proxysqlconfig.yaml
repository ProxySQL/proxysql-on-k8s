                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              driftedReplicas:
                description: |-
                  DriftedReplicas is the number of ready replicas whose runtime tables
                  diverged from the desired config at the last runtime check. 0 when
                  everything converged.
                format: int32
                type: integer
              lastAppliedHash:
                description: LastAppliedHash is a SHA of the spec last successfully
                  pushed to the cluster.
                type: string
              lastRuntimeCheckTime:
                description: |-
                  LastRuntimeCheckTime is when the operator last read runtime state back
                  from the replicas.
                format: date-time
                type: string
              lastSyncTime:
                description: |-
                  LastSyncTime is when the operator last asserted desired state on the
                  cluster — either by writing it, or by verifying via runtime read-back
                  that no replica had drifted.
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              shunnedBackends:
                description: |-
                  ShunnedBackends is the total number of backend server rows in SHUNNED
                  state across all replicas at the last runtime check.
                format: int32
                type: integer
              syncedReplicas:
                description: SyncedReplicas is the number of ProxySQL pods that received
                  the latest config.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
