                    ruleId:
                      format: int32
                      type: integer
                    schemaName:
                      type: string
                    timeout:
                      description: |-
                        Timeout in milliseconds for matching queries; queries running longer
                        are killed. Maps to timeout; unset = mysql-default_query_timeout.
                      format: int32
                      minimum: 0
                      type: integer
                    username:
                      type: string
                  required:
