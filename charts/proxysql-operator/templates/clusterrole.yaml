# The operator's manager cache is not namespace-scoped, so it watches
# resources cluster-wide and requires a ClusterRole. A namespaced-only mode
# would need both a Role here and a --namespace cache restriction wired into
# the manager (cmd/main.go); that isn't implemented, so RBAC is always
# cluster-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "proxysql-operator.fullname" . }}-manager
  labels:
    {{- include "proxysql-operator.labels" . | nindent 4 }}
rules:
  # configmaps: read + delete only — needed to garbage-collect the legacy
  # bootstrap-cnf ConfigMap left behind by operator versions < v0.3.0. The
  # operator no longer creates or updates any ConfigMap (the cnf lives in a
  # Secret).
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [delete, get, list, watch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters, proxysqlconfigs]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters/status, proxysqlconfigs/status]
    verbs: [get, patch, update]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters/finalizers, proxysqlconfigs/finalizers]
    verbs: [update]
  {{- if and .Values.metrics.enabled .Values.metrics.secureServing }}
  # controller-runtime's WithAuthenticationAndAuthorization filter (wired in
  # cmd/main.go whenever --metrics-secure=true) authenticates and
  # authorizes every request to the metrics endpoint by having the manager
  # itself create TokenReviews/SubjectAccessReviews against the API server.
  # Without this, the manager can't validate scraper credentials and every
  # scrape gets a 401/403.
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "proxysql-operator.fullname" . }}-manager
  labels:
    {{- include "proxysql-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "proxysql-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "proxysql-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- if and .Values.metrics.enabled .Values.metrics.secureServing }}
---
# Grants GET on the secured /metrics nonResourceURL. The chart doesn't know
# which ServiceAccount does the scraping (Prometheus, a ServiceMonitor's
# scrape credentials, etc.), so it renders this ClusterRole for operators to
# bind themselves, e.g.:
#   kubectl create clusterrolebinding <name>-metrics-reader \
#     --clusterrole={{ include "proxysql-operator.fullname" . }}-metrics-reader \
#     --serviceaccount=<scraper-namespace>:<scraper-serviceaccount>
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "proxysql-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "proxysql-operator.labels" . | nindent 4 }}
rules:
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
{{- end }}
