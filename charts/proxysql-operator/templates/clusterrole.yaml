# The operator's manager cache is not namespace-scoped, so it watches
# resources cluster-wide and requires a ClusterRole. A namespaced-only mode
# would need both a Role here and a --namespace cache restriction wired into
# the manager (cmd/main.go); that isn't implemented, so RBAC is always
# cluster-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "proxysql-operator.fullname" . }}-manager
  labels:
    {{- include "proxysql-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters, proxysqlconfigs]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters/status, proxysqlconfigs/status]
    verbs: [get, patch, update]
  - apiGroups: [proxysql.com]
    resources: [proxysqlclusters/finalizers, proxysqlconfigs/finalizers]
    verbs: [update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "proxysql-operator.fullname" . }}-manager
  labels:
    {{- include "proxysql-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "proxysql-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "proxysql-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
